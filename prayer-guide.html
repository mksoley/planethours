<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Manevi Rehber — Dua & Ritüel Önerileri</title>
  <link rel="stylesheet" href="/styles.css">
  <style>
    /* ── Hour Info ── */
    .hour-info-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
      gap:14px;
      margin-top:20px;
    }
    .hour-info-item{
      display:flex;
      flex-direction:column;
      gap:6px;
      padding:16px;
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(16,185,129,0.25);
      border-radius:16px;
    }
    .hour-info-item.full{grid-column:1/-1;}
    .hour-info-label{
      font-size:11px;
      font-weight:700;
      text-transform:uppercase;
      letter-spacing:1.2px;
      color:var(--green-light);
    }
    .hour-info-value{
      font-size:16px;
      font-weight:600;
      color:var(--text);
      line-height:1.4;
    }

    /* ── Religion Grid ── */
    .religion-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
      gap:14px;
      margin-top:20px;
    }
    .religion-card{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:10px;
      padding:22px 12px;
      border-radius:20px;
      border:2px solid rgba(16,185,129,0.2);
      background:rgba(255,255,255,0.05);
      cursor:pointer;
      transition:all 0.35s cubic-bezier(0.4,0,0.2,1);
      text-align:center;
      user-select:none;
    }
    .religion-card:hover{
      transform:translateY(-5px);
      border-color:rgba(16,185,129,0.5);
      box-shadow:0 10px 28px rgba(16,185,129,0.25);
      background:rgba(16,185,129,0.1);
    }
    .religion-card.selected{
      border-color:var(--orange);
      background:linear-gradient(135deg,rgba(16,185,129,0.2),rgba(249,115,22,0.2));
      box-shadow:0 10px 36px rgba(249,115,22,0.35), 0 0 30px rgba(16,185,129,0.2);
      transform:translateY(-5px) scale(1.06);
    }
    .religion-emoji{
      font-size:38px;
      line-height:1;
      filter:drop-shadow(0 2px 8px rgba(255,255,255,0.15));
    }
    .religion-label{
      font-weight:700;
      font-size:13px;
      color:var(--text);
    }

    /* ── Loading ── */
    .loading-state{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:18px;
      padding:48px 24px;
      text-align:center;
    }
    .loading-spinner{
      width:52px;
      height:52px;
      border:4px solid rgba(16,185,129,0.2);
      border-top-color:var(--accent);
      border-right-color:var(--orange);
      border-radius:50%;
      animation:spin-loader 0.9s linear infinite;
    }
    @keyframes spin-loader{ to{transform:rotate(360deg);} }
    .loading-dots span{
      display:inline-block;
      animation:dot-bounce 1.2s ease-in-out infinite;
      font-size:28px;
    }
    .loading-dots span:nth-child(2){animation-delay:.2s;}
    .loading-dots span:nth-child(3){animation-delay:.4s;}
    @keyframes dot-bounce{
      0%,80%,100%{transform:scale(0.8);opacity:0.4;}
      40%{transform:scale(1.2);opacity:1;}
    }

    /* ── Results ── */
    .results-header{
      margin-bottom:28px;
      padding-bottom:20px;
      border-bottom:2px solid rgba(16,185,129,0.3);
    }
    .results-meta{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:14px;
    }
    .cursor-blink{
      display:inline-block;
      width:3px;
      height:1.1em;
      background:var(--green-light);
      animation:cur-blink 0.8s step-end infinite;
      vertical-align:text-bottom;
      margin-left:3px;
      border-radius:2px;
    }
    @keyframes cur-blink{0%,100%{opacity:1;}50%{opacity:0;}}

    /* ── Markdown typography ── */
    .results-content{line-height:1.85;color:var(--text);}
    .results-content h1{font-size:2em;color:var(--green-light);margin:28px 0 14px;font-weight:800;background:linear-gradient(135deg,var(--green-light),var(--orange-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .results-content h2{font-size:1.55em;color:var(--green-light);margin:24px 0 12px;font-weight:700;border-bottom:1px solid rgba(16,185,129,0.3);padding-bottom:6px;}
    .results-content h3{font-size:1.25em;color:var(--orange-light);margin:20px 0 10px;font-weight:700;}
    .results-content h4{font-size:1.1em;color:var(--gold);margin:16px 0 8px;font-weight:700;}
    .results-content p{margin:12px 0;}
    .results-content ul,
    .results-content ol{margin:12px 0 12px 24px;}
    .results-content li{margin:8px 0;}
    .results-content strong{color:var(--green-light);font-weight:700;}
    .results-content em{color:var(--orange-light);}
    .results-content hr{border:none;border-top:2px solid rgba(16,185,129,0.25);margin:28px 0;}
    .results-content blockquote{
      border-left:4px solid var(--orange);
      padding:10px 20px;
      margin:18px 0;
      background:rgba(249,115,22,0.08);
      border-radius:0 14px 14px 0;
      font-style:italic;
      color:var(--text-muted);
    }
    .results-content code{
      background:rgba(16,185,129,0.15);
      border:1px solid rgba(16,185,129,0.3);
      border-radius:6px;
      padding:2px 8px;
      font-size:0.9em;
      color:var(--green-light);
    }
    .results-content pre{
      background:rgba(0,0,0,0.3);
      border:1px solid rgba(16,185,129,0.2);
      border-radius:14px;
      padding:20px;
      overflow-x:auto;
      margin:16px 0;
    }
    .results-content pre code{background:none;border:none;padding:0;color:var(--text);}
    .results-content table{width:100%;border-collapse:collapse;margin:16px 0;}
    .results-content th{background:rgba(16,185,129,0.2);padding:10px 14px;text-align:left;color:var(--green-light);}
    .results-content td{padding:10px 14px;border-bottom:1px solid rgba(255,255,255,0.07);}

    /* ── Error ── */
    .error-state{
      padding:32px;
      text-align:center;
      color:var(--orange-light);
    }
    .error-state h3{color:#f87171;margin-bottom:12px;}

    /* ── Back button ── */
    .btn-back{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 20px;
      border-radius:14px;
      background:rgba(255,255,255,0.1);
      border:1px solid rgba(16,185,129,0.3);
      color:var(--text);
      text-decoration:none;
      font-weight:600;
      cursor:pointer;
      transition:all 0.3s ease;
    }
    .btn-back:hover{
      background:rgba(16,185,129,0.2);
      border-color:var(--green-light);
      transform:translateX(-3px);
    }

    @media(max-width:640px){
      .religion-grid{grid-template-columns:repeat(auto-fill,minmax(90px,1fr));}
      .religion-emoji{font-size:28px;}
      .religion-label{font-size:11px;}
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div>
        <h1>🌿 Manevi Rehber</h1>
        <div class="summary">Gezegen saatine özel dua ve ritüel tavsiyeleri</div>
      </div>
      <div class="controls">
        <button class="btn-back" onclick="goHome()">← Ana Sayfaya Dön</button>
      </div>
    </header>

    <div class="single-column">

      <!-- Hour Info -->
      <div class="panel" id="hourInfoPanel">
        <h3>⏰ Seçilen Saat Dilimi</h3>
        <div class="hour-info-grid" id="hourInfoGrid"></div>
      </div>

      <!-- Religion Selection -->
      <div class="panel">
        <h3>🕌 Din Tercihinizi Seçin</h3>
        <p class="summary">Dua önerileriniz seçtiğiniz inanç çerçevesinde hazırlanacaktır.</p>
        <div class="religion-grid" id="religionGrid"></div>
      </div>

      <!-- Action Panel -->
      <div class="panel" id="actionPanel" style="display:none">
        <p class="summary">Seçilen din: <strong id="selectedReligionLabel" style="color:var(--orange-light)"></strong></p>
        <button id="getAdviceBtn" onclick="getPrayerAdvice()" style="width:100%;padding:18px;font-size:17px;letter-spacing:0.5px;">
          ✨ Bu Saat Dilimi İçin Dua ve Ritüel Önerileri Al
        </button>
      </div>

      <!-- Results -->
      <div class="panel" id="resultsPanel" style="display:none"></div>

    </div>

    <footer style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;">
      <span>🌿 Manevi Rehber — Planetary Dua Saatleri</span>
      <button class="btn-back" onclick="goHome()">← Ana Sayfaya Dön</button>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <script src="/prayer-guide.js"></script>
</body>
</html>
