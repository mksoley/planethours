[build]
  publish = "."
  command = ""

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://ipapi.co https://www.google-analytics.com https://analytics.google.com; font-src 'self'; worker-src 'self'; base-uri 'self';"
    Permissions-Policy = "geolocation=(self)"
